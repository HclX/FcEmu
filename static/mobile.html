<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Standalone iOS/Android web app capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Absolute viewport Lock -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FcEmu - Mobile Console</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #7aa2f7;
            --text-color: #a9b1d6;
            --overlay-bg: rgba(26, 27, 38, 0.45);
            --control-opacity: 0.5;
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
            --safe-area-top: env(safe-area-inset-top, 0px);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Fluid 4:3 Canvas */
        #emulator-canvas {
            display: block;
            height: 100vh;
            width: calc(100vh * (4 / 3));
            max-width: 100vw;
            margin: 0 auto;
            background-color: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
        }

        /* Overlays */
        .control-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Collapsible Top Bar HUD */
        .hud-bar {
            position: absolute;
            top: calc(10px + var(--safe-area-top));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 18px;
            border-radius: 24px;
            background: rgba(26, 27, 38, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0.15;
            transition: opacity 0.3s ease;
        }

        .hud-bar:hover, .hud-bar:focus-within, .hud-bar.active {
            opacity: 1.0;
        }

        .hud-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            transition: background 0.2s ease;
        }

        .hud-btn:active {
            background: rgba(122, 162, 247, 0.3);
        }

        .rom-select {
            background: #1a1b26;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 10px;
            outline: none;
            max-width: 120px;
        }

        /* Virtual D-Pad Overlay (Left) */
        .dpad-container {
            position: absolute;
            bottom: calc(30px + var(--safe-area-bottom));
            left: calc(30px + var(--safe-area-left));
            width: 160px;
            height: 160px;
            opacity: var(--control-opacity);
            transition: opacity 0.2s ease;
        }

        .dpad-container:active {
            opacity: 0.8;
        }

        /* Cross Shape D-Pad */
        .dpad-surface {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(36, 40, 59, 0.5);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* Visual guidelines for D-pad cross */
        .dpad-surface::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 40%;
            width: 20%;
            height: 70%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .dpad-surface::after {
            content: '';
            position: absolute;
            top: 40%;
            left: 15%;
            width: 70%;
            height: 20%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        /* D-Pad directions indicators */
        .dpad-arrow {
            position: absolute;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: bold;
        }
        .dpad-arrow.up { top: 8px; left: 50%; transform: translateX(-50%); }
        .dpad-arrow.down { bottom: 8px; left: 50%; transform: translateX(-50%); }
        .dpad-arrow.left { left: 8px; top: 50%; transform: translateY(-50%); }
        .dpad-arrow.right { right: 8px; top: 50%; transform: translateY(-50%); }

        /* Ergonomic Action Buttons (Right) */
        .actions-container {
            position: absolute;
            bottom: calc(30px + var(--safe-area-bottom));
            right: calc(30px + var(--safe-area-right));
            display: flex;
            gap: 18px;
            opacity: var(--control-opacity);
            transition: opacity 0.2s ease;
        }

        .actions-container:active {
            opacity: 0.8;
        }

        .action-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(247, 118, 142, 0.25); /* Ergonomic Reddish/Magenta tint for retro console vibe */
            border: 3px solid rgba(247, 118, 142, 0.6);
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.1s ease, background 0.1s ease;
        }

        /* Slanted placement */
        .btn-b {
            transform: translateY(15px);
        }
        .btn-a {
            transform: translateY(-10px);
            background: rgba(122, 162, 247, 0.25); /* Blue accent */
            border-color: rgba(122, 162, 247, 0.6);
        }

        .action-btn:active {
            transform: scale(0.9) translateY(var(--active-translate, 0px));
        }
        .btn-b:active {
            --active-translate: 15px;
            background: rgba(247, 118, 142, 0.5);
        }
        .btn-a:active {
            --active-translate: -10px;
            background: rgba(122, 162, 247, 0.5);
        }

        /* Interaction overlays */
        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .touch-overlay.hidden {
            display: none;
        }

        .touch-overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .pulse-ring {
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            height: 80px;
            width: 80px;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Emulation Canvas -->
        <canvas id="emulator-canvas" width="256" height="240"></canvas>

        <!-- Interactive Gamepad Overlays -->
        <div class="control-overlay">
            <!-- Minimized Collapsible Top HUD -->
            <div class="hud-bar interactive" id="mobile-hud">
                <select class="rom-select" id="mobile-rom-select">
                    <option value="">📚 Load ROM</option>
                    <!-- Populated dynamically -->
                </select>
                <button class="hud-btn" id="btn-mobile-select">SELECT</button>
                <button class="hud-btn" id="btn-mobile-start">START</button>
                <button class="hud-btn" id="btn-mobile-reset">RESET</button>
                <button class="hud-btn" id="btn-mobile-mute">MUTE</button>
                <button class="hud-btn" id="btn-mobile-fullscreen">📺</button>
            </div>

            <!-- Bottom-Left: Virtual D-Pad -->
            <div class="dpad-container interactive" id="dpad-overlay">
                <div class="dpad-surface" id="virtual-dpad">
                    <div class="dpad-arrow up">▲</div>
                    <div class="dpad-arrow right">▶</div>
                    <div class="dpad-arrow down">▼</div>
                    <div class="dpad-arrow left">◀</div>
                </div>
            </div>

            <!-- Bottom-Right: Ergonomic A & B Buttons -->
            <div class="actions-container interactive">
                <div class="action-btn btn-b" id="btn-action-b">B</div>
                <div class="action-btn btn-a" id="btn-action-a">A</div>
            </div>
        </div>

        <!-- First Touch Gestures Overlay (Triggers Audio Context & Orientation Lock) -->
        <div id="touch-overlay" class="touch-overlay">
            <p>Tap screen to start mobile console</p>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <script type="module" src="./mobile.js"></script>
</body>
</html>
